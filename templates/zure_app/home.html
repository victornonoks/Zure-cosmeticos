<!-- base.html - HTML para a página base -->
<!DOCTYPE html>
<html lang="pt-br">
{% load static %}
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Zure Cosméticos {% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
  <div class="container-fluid" id="div-principal">
    {% block content %}
    <nav class=" container-fluid navbar navbar-expand-xl navbar-light bg-light" aria-label="Second navbar example"> 
      <div class="container-fluid"> 
          <a class="navbar-brand" href="#">Always expand</a> 
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample02" aria-controls="navbarsExample02" aria-expanded="false" aria-label="Toggle navigation"> 
            <span class="navbar-toggler-icon"></span> 
          </button> 
        <div class="collapse navbar-collapse"> 
            <ul class="navbar-nav me-auto"> 
              <li class="nav-item"> 
                <a class="nav-link active" aria-current="page" href="#">Home</a> 
              </li> 
              <li class="nav-item"> 
                <a class="nav-link" href="#">Link</a> 
              </li> 
            </ul> 
            <form role="search"> 
              <input class="form-control" type="search" placeholder="Search" aria-label="Search"> 
            </form> 
        </div> 
      </div> 
    </nav>
    {% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
